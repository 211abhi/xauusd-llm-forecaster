# base_config.yaml — Single source of truth. No hardcoded values in source files.

project:
  name: "xauusd-llm-forecaster"
  seed: 42
  device: "cuda"          # "cuda" or "cpu"
  log_dir: "logs/"
  checkpoint_dir: "checkpoints/"

data:
  raw_path: "data/raw/XAU_30m_data.csv"
  processed_dir: "data/processed/"
  splits_dir: "data/splits/"
  datetime_col: "datetime"
  feature_cols: ["open", "high", "low", "close", "volume"]
  derived_features: ["returns", "log_returns", "hl_range", "body_ratio"]
  indicators:
    atr_period: 14
    rsi_period: 14
    ema_fast: 20
    ema_slow: 50
  split_ratios:
    train: 0.70
    val: 0.15
    test: 0.15
  normalization: "rolling_minmax"
  norm_window: 500        # candles for rolling normalization

regime_labeling:
  rsi_high: 55
  rsi_low: 45
  rsi_mid_low: 40
  rsi_mid_high: 60
  ranging_atr_mult: 0.3
  atr_spike_mult: 1.5
  hl_range_spike_mult: 1.5
  breakout_lookback: 20
  volume_spike_mult: 1.5

tokenizer:
  window_size: 96         # input context (48 hours at 30m)
  patch_size: 16          # steps per patch
  n_patches: 6            # window_size // patch_size
  n_features: 9           # OHLCV(5) + returns + log_returns + ATR + RSI
  patch_dim: 144          # patch_size * n_features = 16 * 9
  train_stride: 1         # sliding window stride for train set
  val_stride: 8           # stride for val/test (less overlap)

encoder:
  embed_dim: 256
  n_heads: 8
  n_layers: 4
  ffn_dim: 512
  dropout: 0.1
  max_seq_len: 7          # n_patches + 1 (CLS token)
  output_dim: 256         # CLS token output dimension
  checkpoint_path: "checkpoints/encoder/best_encoder.pt"

alignment:
  temperature: 0.07       # InfoNCE temperature
  projection_dim: 768     # project TS embed up to LLM hidden dim
  n_regimes: 5
  regime_labels:
    - "TRENDING_UP"
    - "TRENDING_DOWN"
    - "RANGING"
    - "VOLATILE"
    - "BREAKOUT"
  n_negatives: 4          # negatives per positive pair

encoder_training:
  epochs: 50
  batch_size: 64
  lr: 1.0e-4
  weight_decay: 1.0e-5
  warmup_steps: 200
  lr_schedule: "cosine"
  patience: 10            # early stopping patience
  val_every: 1            # validate every N epochs

llm:
  model_name: "gpt2-medium"   # 345M params, 768 hidden dim
  # alternative: "meta-llama/Llama-3.2-1B" if VRAM >= 16GB
  hidden_dim: 768
  freeze_all: true
  hidden_state_layer: -1      # last layer
  hidden_state_position: 0    # CLS token (first position)
  cache_dir: ".cache/llm"

soft_prompt:
  n_tokens: 32
  token_dim: 768              # must match llm.hidden_dim
  init_std: 0.01
  checkpoint_path: "checkpoints/soft_prompt/best_soft_prompt.npy"

cmaes:
  subspace_dim: 500           # BBTv2 trick: optimize in low-dim subspace
  popsize: 20
  sigma0: 0.1
  maxiter: 300
  early_stop_patience: 50     # generations without improvement
  fitness_metric: "val_mae"   # minimize this
  eval_batch_size: 32

prediction_head:
  input_dim: 768              # must match llm.hidden_dim
  hidden_dim: 256
  output_steps: 8             # predict 8 × 30min = 4 hours ahead
  dropout: 0.1
  checkpoint_path: "checkpoints/pred_head/best_pred_head.pt"

pred_head_training:
  epochs: 30
  batch_size: 32
  lr: 1.0e-3
  weight_decay: 1.0e-5
  patience: 10
  loss: "mse"

evaluation:
  metrics: ["mae", "rmse", "directional_accuracy"]
  per_regime: true
  rolling_window_months: 1